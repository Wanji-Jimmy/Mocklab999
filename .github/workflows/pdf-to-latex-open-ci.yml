name: pdf-to-latex-open-ci

on:
  push:
    paths:
      - 'skills/pdf-to-latex-open/**'
      - '.github/workflows/pdf-to-latex-open-ci.yml'
  pull_request:
    paths:
      - 'skills/pdf-to-latex-open/**'
      - '.github/workflows/pdf-to-latex-open-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r skills/pdf-to-latex-open/requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s skills/pdf-to-latex-open/tests -v
