name: tmua-pdf-to-mock-pipeline-ci

on:
  push:
    paths:
      - 'skills/tmua-pdf-to-mock-pipeline/**'
      - '.github/workflows/tmua-pdf-to-mock-pipeline-ci.yml'
  pull_request:
    paths:
      - 'skills/tmua-pdf-to-mock-pipeline/**'
      - '.github/workflows/tmua-pdf-to-mock-pipeline-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: |
          python -m unittest discover -s skills/tmua-pdf-to-mock-pipeline/tests -v
