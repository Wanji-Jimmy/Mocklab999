<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">MockLab999 logo</title>
  <desc id="desc">Rose-gold MockLab999 monogram and wordmark on a navy plaque.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="18" x2="888" y2="282" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d2b43" />
      <stop offset="1" stop-color="#132138" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(782 72) rotate(133.3) scale(198 286)">
      <stop stop-color="#2d3d58" stop-opacity="0.9" />
      <stop offset="1" stop-color="#132138" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="metal" x1="206" y1="42" x2="426" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0cdb0" />
      <stop offset="0.45" stop-color="#d2a280" />
      <stop offset="1" stop-color="#b98361" />
    </linearGradient>
    <linearGradient id="wordmark" x1="248" y1="206" x2="711" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e6bf9f" />
      <stop offset="0.5" stop-color="#d4a380" />
      <stop offset="1" stop-color="#be8a66" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#081120" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect x="8" y="8" width="944" height="284" rx="34" fill="url(#bg)" />
  <rect x="8" y="8" width="944" height="284" rx="34" fill="url(#glow)" />

  <g filter="url(#shadow)" transform="translate(112 28)" fill="none" stroke="url(#metal)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M128 54c-24 0-43 19-43 43s19 43 43 43" />
    <path d="M147 54v127l-39 47" />
    <path d="M181 54c-23 0-41 18-41 41 0 24 18 42 41 42" />
    <path d="M176 54c0-27 22-49 49-49 27 0 49 22 49 49" />
    <path d="M274 54c0-27 22-49 49-49 27 0 49 22 49 49 0 27-22 49-49 49" />
    <path d="M227 82 274 178 321 82" />
    <path d="M321 82v146" />
    <path d="M369 103c22 0 40 18 40 40s-18 40-40 40" />
    <path d="M369 103v125" />
    <path d="M409 143v85" />
